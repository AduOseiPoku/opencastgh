server {
    listen 80;
    server_name opencastgh.com www.opencastgh.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name opencastgh.com www.opencastgh.com;

    ssl_certificate /etc/letsencrypt/live/opencastgh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opencastgh.com/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /home/ubuntu/opencastgh/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/ubuntu/opencastgh/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
